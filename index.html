<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="author" content="Pranab | Phe0nix">
    <meta name="description" content="Capture quick notes in a polished workspace with instant search and auto-save.">
    <meta name="keywords" content="minipad,notepad,quick writing notes,notedown notes, scrapbook">
    <title>MiniPad | Notes that stay out of your way</title>
    <script>
      (function () {
        var storageKey = "minipad.theme.v1";
        var saved = localStorage.getItem(storageKey);
        var fallback = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        var theme = saved === "dark" || saved === "light" ? saved : fallback;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css"/>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero__copy">
          <p class="eyebrow">MiniPad</p>
          <h1>Fast notes, clean desk.</h1>
          <p class="hero__text">
            Keep short notes in a focused canvas with instant search, local auto-save,
            and a layout that stays readable on mobile and desktop.
          </p>
        </div>

        <div class="hero__panel">
          <div class="toolbar">
            <label class="search-field" for="search-notes">
              <span>Search notes</span>
              <input id="search-notes" type="search" placeholder="Search by title or content">
            </label>

            <div class="toolbar__actions">
              <button id="add-note" class="btn btn--primary" type="button">New note</button>
              <button id="clear-notes" class="btn btn--ghost" type="button">Clear all</button>
              <button id="theme-toggle" class="btn btn--ghost" type="button" aria-pressed="false">Dark mode</button>
            </div>

            <p class="toolbar__hint">Shortcuts: Ctrl/Cmd+Alt+N new note, Ctrl/Cmd+K search, Esc clear search</p>
          </div>

          <div class="stats" aria-live="polite">
            <div>
              <span class="stats__label">Visible notes</span>
              <strong id="note-count">0</strong>
            </div>
            <div>
              <span class="stats__label">Saved locally</span>
              <strong id="save-state">Ready</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="links" aria-label="External links">
        <a href="https://phe0nix.github.io/" class="chip">Creator home</a>
        <a href="https://github.com/Phe0nix/minipad" class="chip" target="_blank" rel="noreferrer">Source code</a>
      </section>

      <section class="workspace">
        <div id="notes-grid" class="notes-grid" aria-live="polite"></div>
      </section>
    </main>

    <template id="note-template">
      <article class="note-card">
        <div class="note-card__header">
          <input class="note-card__title" type="text" maxlength="80" placeholder="Untitled note" aria-label="Note title">
          <button class="icon-button" type="button" data-action="delete" aria-label="Delete note">Delete</button>
        </div>

        <textarea class="note-card__body" rows="8" placeholder="Write something useful..."></textarea>

        <div class="note-card__footer">
          <span class="note-card__meta" data-role="updated-at">Just now</span>
          <span class="note-card__meta" data-role="character-count">0 chars</span>
        </div>
      </article>
    </template>

    <script src="index.js"></script>
  </body>
</html>
